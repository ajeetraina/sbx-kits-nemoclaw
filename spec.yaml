schemaVersion: "1"
kind: mixin
name: nemoclaw
displayName: NemoClaw (OpenClaw)
description: "Adds the NVIDIA NemoClaw CLI (nemoclaw) to an agent and selects the OpenClaw agent, so the agent can onboard and drive always-on AI agents inside NVIDIA OpenShell sandboxes. Inference uses NVIDIA Endpoints (build.nvidia.com); inject the key with `sbx secret set-custom` (see README) — the kit holds no key."

# Install pulls the CLI from GitHub via npm; runtime inference routes to NVIDIA
# Endpoints (integrate.api.nvidia.com). The NVIDIA key is NOT a built-in sbx
# service, so it is injected as a CUSTOM secret (sbx secret set-custom), not via
# proxyManaged. See README "Inference key" for the exact command.
network:
  allowedDomains:
    - github.com
    - raw.githubusercontent.com
    - codeload.github.com
    - objects.githubusercontent.com
    - registry.npmjs.org
    - integrate.api.nvidia.com        # NVIDIA Endpoints inference (build.nvidia.com)

environment:
  variables:
    NEMOCLAW_AGENT: "openclaw"                  # OpenClaw is the default NemoClaw agent
    NEMOCLAW_PROVIDER: "build"                  # NVIDIA Endpoints (build.nvidia.com catalog)
    NEMOCLAW_NON_INTERACTIVE: "1"               # never block on a TTY prompt
    NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"   # accept the third-party software notice unattended
    npm_config_prefix: "/home/agent/.local"     # global npm bins land in ~/.local/bin (no root needed)

  # NOTE: NVIDIA_INFERENCE_API_KEY is intentionally NOT set here and NOT listed
  # under proxyManaged — sbx has no built-in `nvidia` service. Inject it as a
  # custom secret BEFORE launching the agent:
  #
  #   sbx secret set-custom -g --host integrate.api.nvidia.com \
  #     --env NVIDIA_INFERENCE_API_KEY --placeholder 'nvapi-{rand}' --value <nvapi-key>
  #
  # The sandbox sees the placeholder (a valid nvapi- prefix for NemoClaw's local
  # check); the proxy swaps it for the real key on requests to the host above.

commands:
  # Runs ONCE at sandbox creation, as the agent user. Installs the `nemoclaw` and
  # `nemohermes` CLIs from the NVIDIA repo. NemoClaw requires Node.js >= 22.16.
  install:
    - command: "node --version"
      user: "1000"
      description: "Sanity check: NemoClaw requires Node.js >= 22.16 (fails fast if the base image is older)"
    - command: "npm install -g 'git+https://github.com/NVIDIA/NemoClaw.git'"
      user: "1000"
      description: "Install the nemoclaw / nemohermes CLIs from the NVIDIA NemoClaw repo into ~/.local/bin"

  # A non-interactive onboarding template the agent can source before running
  # `nemoclaw onboard`. onlyIfMissing keeps user edits across restarts.
  initFiles:
    - path: /home/agent/.nemoclaw/onboard.env
      mode: "0644"
      onlyIfMissing: true
      description: "Non-interactive onboarding defaults for NemoClaw (OpenClaw + NVIDIA Endpoints)"
      content: |
        # Source this, then run `nemoclaw onboard --non-interactive`.
        # The NVIDIA key arrives as a custom sbx secret bound to
        # integrate.api.nvidia.com (see the kit README). To use a different
        # provider, change NEMOCLAW_PROVIDER and inject the matching key + host:
        #   build      -> NVIDIA_INFERENCE_API_KEY  (integrate.api.nvidia.com)   [default, custom secret]
        #   anthropic  -> ANTHROPIC_API_KEY         (api.anthropic.com)          [built-in: sbx secret set -g anthropic]
        #   openai     -> OPENAI_API_KEY            (api.openai.com)             [built-in: sbx secret set -g openai]
        #   gemini     -> GEMINI_API_KEY            (generativelanguage.googleapis.com)
        export NEMOCLAW_AGENT="openclaw"
        export NEMOCLAW_PROVIDER="build"
        export NEMOCLAW_NON_INTERACTIVE="1"
        export NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE="1"
        export PATH="/home/agent/.local/bin:$PATH"

# Injected into the agent's memory file (CLAUDE.md / AGENTS.md) so the agent KNOWS
# the capability exists and how to call it. (kit-spec v2 field name; older schemas
# called this `memory`.)
agentContext: |
  ## NemoClaw (OpenClaw)

  The NVIDIA NemoClaw CLI is installed (`~/.local/bin/nemoclaw`, also
  `nemohermes`). It runs always-on AI agents inside NVIDIA OpenShell sandboxes;
  this kit selects the **OpenClaw** agent and routes inference to NVIDIA
  Endpoints. Onboard non-interactively with:

      source ~/.nemoclaw/onboard.env && nemoclaw onboard --non-interactive

  NVIDIA_INFERENCE_API_KEY is supplied by a custom sbx secret bound to
  integrate.api.nvidia.com (the sandbox only ever sees a placeholder). NemoClaw
  needs Docker on the host to create OpenShell sandboxes (see the kit README).
